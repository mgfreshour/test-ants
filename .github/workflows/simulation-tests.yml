name: Simulation Tests

on:
  pull_request:
  push:
    branches: ["master"]

jobs:
  simulation-unit:
    name: Fast Simulation Unit Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run fast simulation unit tests
        run: cargo test sim_core

  simulation-integration:
    name: Slower Simulation Integration Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Run headless integration tests
        run: cargo test sim_plugin_
