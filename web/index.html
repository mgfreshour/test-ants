<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony — An Ant Colony Simulation</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        #bevy { width: 100%; height: 100%; display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #888; font-family: monospace; font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div id="loading">Loading Colony...</div>
    <canvas id="bevy"></canvas>
    <script type="module">
        import init from './out/colony.js';
        init().then(() => {
            document.getElementById('loading').remove();
        }).catch(e => {
            document.getElementById('loading').textContent = 'Failed to load: ' + e;
            console.error(e);
        });
    </script>
</body>
</html>
